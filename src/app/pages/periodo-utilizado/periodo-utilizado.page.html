<app-header title="Periodos Utilizados"></app-header>

<ion-content>
  <ion-card class="fondo">
    <ion-card-header>
      <ion-card-subtitle>Trabajador:</ion-card-subtitle>
      <ion-card-title class="text-color">{{ trabajador }}</ion-card-title>
    </ion-card-header>
  </ion-card>

  <ion-list>
    <ion-item-sliding class="fondo" *ngFor="let item of periodos">
      <ion-item>
        <ion-label>
          <h3>Periodo</h3>
        </ion-label>
        <ion-label slot="end" class="ion-text-right">
          <p>{{ item.ano_inicio }} {{ item.ano_termino }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="detail(item)">
          <ion-icon slot="icon-only" name="eye"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ion-grid *ngIf="periodos.length == 0 || periodos == null">
    <ion-row>
      <ion-col>
        <ion-text color="secondary" class="ion-text-center">
          <h5>Disculpe no se han encontrado registros asociados a usted.</h5>
        </ion-text>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
