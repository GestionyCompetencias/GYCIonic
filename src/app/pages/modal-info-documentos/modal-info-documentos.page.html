<ion-header class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>Detalles Documento</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="cerrarModal()" color="tertiary" fill="solid" shape="round">
        <ion-icon slot="start" name="close"></ion-icon>
        Cerrar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item>
      <ion-label>
        <h3>Nombre</h3>
        <p class="ion-text-uppercase">{{ nombre }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>RUT</h3>
        <p class="ion-text-uppercase">{{ trabajador }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Tipo</h3>
        <p class="ion-text-uppercase">{{ tipo }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Descripción</h3>
        <p class="ion-text-uppercase">{{ descripcion }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Inicio</h3>
        <p class="ion-text-uppercase">{{ inicio }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Término</h3>
        <p class="ion-text-uppercase">{{ termino }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Carga</h3>
        <p class="ion-text-uppercase">{{ inicio }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Archivo</h3>
        <p class="ion-text-uppercase">{{ archivo }}</p>
      </ion-label>
      <ion-label slot="end" class="ion-text-right">
        <ion-button (click)="downloadFile( url )" color="primary" fill="clear" shape="round">
          <ion-icon slot="icon-only" src="assets/iconos/file-download-solid.svg"></ion-icon>
        </ion-button>
      </ion-label>
    </ion-item>

  </ion-list>

</ion-content>
