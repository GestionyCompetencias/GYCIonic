<ion-header class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>Detalles Notificación</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="cerrarModal()" color="tertiary" fill="solid" shape="round">
        <ion-icon slot="start" name="close"></ion-icon>
        Cerrar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>



  <ion-list>
    <ion-item>
      <ion-label>
        <h3>Tipo</h3>
        <p class="ion-text-uppercase">{{ TIPO }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Fecha</h3>
        <p class="ion-text-uppercase">{{ FECHA }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Observación</h3>
        <p class="ion-text-uppercase">{{ OBSERVACION }}</p>
      </ion-label>
    </ion-item>

  </ion-list>
</ion-content>
