<app-header title="Buscar Documentos"></app-header>

<ion-content>

  <form #formDocumentFind="ngForm" (ngSubmit)="onSubmitFind()">
    <ion-item>
      <ion-label position="floating">Usuario</ion-label>
      <ion-input required name="usuario" [(ngModel)]="dataFind.user" type="text" readonly></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Tipo Documento</ion-label>
      <ion-select [(ngModel)]="dataFind.tipo" name="tipo">
        <ion-select-option *ngFor="let opc of tipoOpc; let i=index" value="{{ opc.id }}">{{ opc.descripcion }}</ion-select-option>
        <ion-select-option value="0">TODOS</ion-select-option>
      </ion-select>
    </ion-item>

    <!-- <ion-item>
      <ion-label position="floating">Descripcion</ion-label>
      <ion-input required name="descripcion" [(ngModel)]="dataFind.descripcion" type="text"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Tipo Documento</ion-label>
      <ion-select [(ngModel)]="dataFind.estado" name="estado">
        <ion-select-option value="0">TODOS</ion-select-option>
        <ion-select-option value="1">SOLO VIGENTES</ion-select-option>
        <ion-select-option value="-1">SOLO VENCIDOS</ion-select-option>
      </ion-select>
    </ion-item> -->



    <ion-button block color="primary" expand="full" type="submit">
      <ion-icon slot="start" name="caret-forward-circle"></ion-icon>
      <ion-label>Buscar</ion-label>
    </ion-button>
  </form>

  <ion-list>
    <ion-item-sliding *ngFor="let item of documents">
      <ion-item>
        <ion-label>
          <p><b>Tipo: </b> <span class="ion-text-uppercase">{{ item.tipo }}</span></p>
          <p><b>Descripcion: </b> <span class="ion-text-uppercase">{{ item.descripcion }}</span></p>
          <p><b>Fecha Carga: </b> {{ item.inicio }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option (click)="detail(item)">
          <ion-icon slot="icon-only" name="eye"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

</ion-content>
