<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>

    <ion-title>Configuraciones</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding fondo">
  <ion-list class="fondo">
    <ion-item-group class="fondo">
      <ion-item-divider class="fondo">
        <ion-label class="fondo">
          <strong>Cuenta</strong>
        </ion-label>
      </ion-item-divider>

      <ion-item class="fondo">
        <ion-avatar slot="start">
          <img src="assets/img/test.jpg" />
        </ion-avatar>
        <ion-label class="fondo">
          <h3>RUT: {{ rut }}</h3>
          <p>&nbsp;</p>
          <p class="ion-text-center fondo">
            <ion-button (click)="changePass()" fill="solid" shape="round">
              Cambiar Contraseña
            </ion-button>
          </p>
        </ion-label>
      </ion-item>

    </ion-item-group>

    <ion-item-group class="fondo">
      <ion-item-divider class="fondo">
        <ion-label class="fondo">
          <strong>Estatus de la App</strong>
        </ion-label>
      </ion-item-divider>

      <ion-item class="fondo">
        <ion-icon name="people" slot="start" color="primary"></ion-icon>
        <ion-label *ngIf="modo === 'INDIVIDUAL'">Modo de Operación: Individual</ion-label>
      </ion-item>

      <ion-item class="fondo">
        <ion-icon src="assets/iconos/one-finger-click.svg" slot="start" color="primary"></ion-icon>
        <ion-label>Touchless: No</ion-label>
      </ion-item>

    </ion-item-group>

    <ion-item-group class="fondo">
      <ion-item-divider>
        <ion-label>Sonido</ion-label>
      </ion-item-divider>


      <ion-item class="fondo">
        <ion-label>Sonido Fallido</ion-label>
        <ion-toggle slot="end" color="primary" [(ngModel)]="alertE" (ionChange)="activateAlertError( $event )"></ion-toggle>
      </ion-item>
      <ion-item class="fondo">
        <ion-label>Sonido Exitoso</ion-label>
        <ion-toggle slot="end" color="primary" [(ngModel)]="alertS" (ionChange)="activateAlertSuccess( $event )"></ion-toggle>
      </ion-item>
      <ion-item-divider class="text-center fondo">
        <ion-label>
          Volumen
        </ion-label>
      </ion-item-divider>
      <ion-item class="fondo">
        <ion-range min="10" max="100" mode="ios" [value]="vol" color="primary" step="10" (ionChange)="setVolumen( $event )"></ion-range>
      </ion-item>
    </ion-item-group>

    <ion-item-group class="fondo">
      <ion-item-divider class="fondo">
        <ion-label class="fondo">GPS</ion-label>
      </ion-item-divider>


      <ion-item class="fondo">
        <ion-label class="fondo">GPS Requerido</ion-label>
        <ion-toggle slot="end" color="primary" [(ngModel)]="gpsAct" (ionChange)="configGPS( $event )"></ion-toggle>
      </ion-item>
    </ion-item-group>

    <ion-item (click)="desloguear()" class="fondo">
      <ion-icon name="log-out" slot="start" color="danger"></ion-icon>
      <ion-label>Logout</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
