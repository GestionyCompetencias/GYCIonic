<app-header title="Pendientes por Firma"></app-header>

<ion-content>
  <ion-list *ngIf="documentos.length > 0">
    <ion-item-sliding *ngFor="let item of documentos">
      <ion-item>
        <ion-label>
          <p><b>Tipo: </b> <span class="ion-text-uppercase">{{ item.tipo }}</span></p>
          <p><b>Trabajador: </b> <span class="ion-text-uppercase">{{ item.trabajador }} - {{ item.nombre }}</span></p>
          <p><b>Fecha Carga: </b> {{ item.inicio }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="secondary" (click)="show(item)">
          <ion-icon slot="icon-only" name="eye"></ion-icon>
        </ion-item-option>
        <ion-item-option color="primary" (click)="confirmSignature(item)">
          <ion-icon slot="icon-only" name="pencil-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

  <ion-list *ngIf="documentos.length === 0">
    <ion-item>
      <ion-label>
        <p class="ion-text-center">
          No posee documentos pendientes por firma en<br>este momento.
        </p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
