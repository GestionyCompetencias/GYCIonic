<ion-header class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>Detalles Marcación</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="cerrarModal()" color="tertiary" fill="solid" shape="round">
        <ion-icon slot="start" name="close"></ion-icon>
        Cerrar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content >
  <ion-list>

    <ion-item>
      <ion-label>
        <h3>RUT</h3>
        <p class="ion-text-uppercase">{{ RUT }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Nombre</h3>
        <p class="ion-text-uppercase">{{ NOMBRE }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Fecha</h3>
        <p class="ion-text-uppercase">{{ FECHA }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Entrada/Salida</h3>
        <p class="ion-text-uppercase">{{ MARCACION }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Hora</h3>
        <p class="ion-text-uppercase">{{ HORA }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Horas Extras</h3>
        <p class="ion-text-uppercase">{{ HHEE }}</p>
      </ion-label>
    </ion-item>

    <ion-item >
      <ion-label id="coordenada" >
        <h3>Geolocalización</h3>
        <ion-icon name="ban"></ion-icon>
      </ion-label>
    </ion-item>

    <ion-item id="coordenada-map" >
      <ion-label>
        <h3>Geolocalización</h3>
        <p class="ion-text-uppercase">{{ COORDENADA }}</p>
      </ion-label>
      <ion-label slot="end" class="ion-text-right">
        <ion-button (click)="openMap( COORDENADA )" color="primary" fill="clear" shape="round">
          <ion-icon slot="icon-only" src="assets/iconos/map-marked-alt-solid.svg"></ion-icon>
        </ion-button>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-list>
    <ion-item>
      <div id="minimap"></div>
    </ion-item>
  </ion-list>
</ion-content>
