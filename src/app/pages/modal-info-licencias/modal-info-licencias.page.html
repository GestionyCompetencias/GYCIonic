<ion-header class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>Detalles Licencia</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="cerrarModal()" color="tertiary" fill="solid" shape="round">
        <ion-icon slot="start" name="close"></ion-icon>
        Cerrar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item>
      <ion-label>
        <h3>Fecha Inicio</h3>
        <p class="ion-text-uppercase">{{ FINICIO }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Fecha Término</h3>
        <p class="ion-text-uppercase">{{ FTERMINO }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Dias</h3>
        <p class="ion-text-uppercase">{{ DIAS }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Comentarios</h3>
        <p class="ion-text-uppercase">{{ COMENTARIO }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Tipo Licencia</h3>
        <p class="ion-text-uppercase">{{ TIPOLICENCIASMEDICAS }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Tipo Medico</h3>
        <p class="ion-text-uppercase">{{ TIPO_MEDICO }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Nombre</h3>
        <p class="ion-text-uppercase">{{ trabajador }}</p>
      </ion-label>
    </ion-item>

  </ion-list>

</ion-content>
